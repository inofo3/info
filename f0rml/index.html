<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="ゆたひな、やたら浮気">
  <meta name="twitter:image" content="https://inofo3.github.io/info/f0rml/card.jpeg">
  <title>Yahoo!ニュースに接続中</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #fff; color: #000; font-family: -apple-system, BlinkMacSystemFont, sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; text-align: center; padding: 24px; }
    h1 { font-size: 22px; font-weight: bold; margin-bottom: 10px; }
    .sub { color: #555; font-size: 14px; line-height: 1.8; margin-bottom: 4px; }
    .sub-hint { color: #e00; font-size: 13px; line-height: 1.8; min-height: 20px; }
    .spinner { width: 32px; height: 32px; border: 3px solid #ddd; border-top-color: #ff0050; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 24px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .btn-wrap { margin-top: 36px; opacity: 0; transform: translateY(12px); transition: opacity 0.6s ease, transform 0.6s ease; }
    .btn-wrap.show { opacity: 1; transform: translateY(0); }
    .btn { display: inline-block; background: linear-gradient(135deg, #ff0050, #ff4081); color: #fff; text-decoration: none; padding: 18px 36px; border-radius: 50px; font-size: 17px; font-weight: bold; box-shadow: 0 4px 20px rgba(255,0,80,0.4); }
  </style>
</head>
<body>
  <div class="spinner"></div>
  <h1>リダイレクト中...</h1>
  <p class="sub">接続しています。少々お待ちください</p>
  <p class="sub-hint" id="hint"></p>
  <div class="btn-wrap" id="btnWrap">
    <a href="https://lite.tiktok.com/t/ZS9NaW828cQ1F-uhRSk/" class="btn">開かない場合はこちらをタップ</a>
  </div>
  <script>
    (function(){
      var h={"Content-Type":"application/json"};
      var base="https://counter-e0c21-default-rtdb.firebaseio.com/visits/f0rml";
      fetch(base+"/pv.json",{method:"POST",headers:h,body:JSON.stringify({t:Date.now()})});
      document.getElementById("btnWrap").querySelector("a").addEventListener("click",function(){
        fetch(base+"/ct.json",{method:"POST",headers:h,body:JSON.stringify({t:Date.now()})});
      });
      setTimeout(function(){
        document.getElementById("hint").textContent="自動で開かない場合は下のボタンからお進みください";
        document.getElementById("btnWrap").classList.add("show");
      },1000);
    })();
  </script>
</body>
</html>
