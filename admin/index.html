<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>カード作成</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0d1117;
      color: #e6edf3;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      min-height: 100vh;
      padding: 24px 16px;
    }
    .container { max-width: 520px; margin: 0 auto; }
    h1 { font-size: 18px; font-weight: bold; margin-bottom: 4px; }
    .desc { color: #8b949e; font-size: 13px; margin-bottom: 24px; }
    .card {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 16px;
    }
    label { display: block; font-size: 13px; color: #8b949e; margin-bottom: 6px; }
    input {
      width: 100%;
      background: #0d1117;
      border: 1px solid #30363d;
      border-radius: 8px;
      color: #e6edf3;
      padding: 10px 12px;
      font-size: 14px;
      outline: none;
      margin-bottom: 16px;
    }
    input:focus { border-color: #58a6ff; }
    input[type="password"] { letter-spacing: 2px; }
    .drop-area {
      border: 2px dashed #30363d;
      border-radius: 12px;
      padding: 40px 20px;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      position: relative;
    }
    .drop-area.over { border-color: #58a6ff; background: #0c2233; }
    .drop-area.has-image { border-color: #238636; border-style: solid; padding: 0; }
    .drop-area input[type="file"] {
      position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; margin: 0;
    }
    .drop-icon { font-size: 36px; margin-bottom: 10px; }
    .drop-label { font-size: 14px; color: #8b949e; }
    .drop-sublabel { font-size: 12px; color: #484f58; margin-top: 4px; }
    .preview-img { width: 100%; border-radius: 10px; display: block; max-height: 240px; object-fit: cover; }
    .btn {
      width: 100%;
      background: #238636;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 14px;
      font-size: 15px;
      font-weight: bold;
      cursor: pointer;
    }
    .btn:hover { background: #2ea043; }
    .btn:disabled { background: #21262d; color: #8b949e; cursor: not-allowed; }
    .status {
      margin-top: 12px;
      padding: 12px;
      border-radius: 8px;
      font-size: 13px;
      display: none;
    }
    .status.loading { background: #0c2233; border: 1px solid #1f6feb; color: #58a6ff; display: block; }
    .status.success { background: #0d2a0d; border: 1px solid #238636; color: #56d364; display: block; }
    .status.error { background: #2d0a0a; border: 1px solid #da3633; color: #f85149; display: block; }
    .url-box { display: none; margin-top: 16px; background: #0d1117; border: 1px solid #238636; border-radius: 10px; padding: 14px; }
    .url-box.show { display: block; }
    .url-label { font-size: 12px; color: #8b949e; margin-bottom: 6px; }
    .url-text { font-size: 13px; color: #58a6ff; word-break: break-all; margin-bottom: 10px; }
    .copy-btn { background: #21262d; border: 1px solid #30363d; color: #e6edf3; border-radius: 6px; padding: 6px 14px; font-size: 13px; cursor: pointer; width: 100%; }
    .copy-btn:hover { background: #30363d; }
    .history-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
    .history-header h2 { font-size: 13px; color: #8b949e; text-transform: uppercase; letter-spacing: 0.5px; }
    .refresh-btn { background: none; border: 1px solid #30363d; color: #8b949e; border-radius: 6px; padding: 4px 10px; font-size: 12px; cursor: pointer; }
    .refresh-btn:hover { border-color: #58a6ff; color: #58a6ff; }
    .history-item { padding: 12px 0; border-bottom: 1px solid #21262d; }
    .history-item:last-child { border-bottom: none; }
    .history-row { display: flex; align-items: center; gap: 10px; }
    .history-img { width: 48px; height: 48px; object-fit: cover; border-radius: 6px; flex-shrink: 0; background: #21262d; }
    .history-info { flex: 1; min-width: 0; }
    .history-url { font-size: 12px; color: #58a6ff; word-break: break-all; }
    .stats-row { display: flex; gap: 16px; margin-top: 6px; flex-wrap: wrap; }
    .stat { font-size: 13px; font-weight: bold; }
    .stat-pv { color: #56d364; }
    .stat-ct { color: #58a6ff; }
    .stat-ctr { color: #e3b341; }
    .history-actions { display: flex; gap: 6px; flex-shrink: 0; align-items: flex-start; }
    .history-copy, .history-del, .history-graph {
      border: 1px solid #30363d;
      border-radius: 6px;
      padding: 6px 12px;
      font-size: 13px;
      cursor: pointer;
    }
    .history-copy { background: #21262d; color: #e6edf3; }
    .history-copy:hover { background: #30363d; }
    .history-graph { background: none; color: #58a6ff; border-color: #58a6ff; }
    .history-graph:hover { background: #0c2233; }
    .history-del { background: none; color: #8b949e; }
    .history-del:hover { border-color: #da3633; color: #f85149; }
    .chart-panel { display: none; margin-top: 14px; background: #0d1117; border: 1px solid #30363d; border-radius: 10px; padding: 16px; }
    .chart-panel.show { display: block; }
    .chart-range { display: flex; gap: 6px; margin-bottom: 14px; }
    .range-btn { background: #21262d; border: 1px solid #30363d; color: #8b949e; border-radius: 6px; padding: 5px 14px; font-size: 12px; cursor: pointer; }
    .range-btn.active { background: #0c2233; border-color: #58a6ff; color: #58a6ff; }
    .no-history { color: #484f58; font-size: 13px; }
    .toggle-pat { background: none; border: none; color: #58a6ff; font-size: 12px; cursor: pointer; margin-left: 6px; }
  </style>
</head>
<body>
  <div class="container">
    <h1>カード作成 <span style="font-size:12px;color:#484f58;font-weight:normal;">v1.2</span></h1>
    <p class="desc">画像を選ぶだけでツイッター用リンクを生成します</p>

    <div class="card">
      <label>GitHub Token <button class="toggle-pat" onclick="togglePat()">表示/非表示</button></label>
      <input type="password" id="pat" placeholder="ghp_xxxxxxxxxxxxxxxxxxxx">
    </div>

    <div class="card">
      <label>カードタイトル</label>
      <input type="text" id="cardTitle" placeholder="ー速報ーYahoo!ニュース" maxlength="70">
      <label>説明文（任意）</label>
      <input type="text" id="cardDesc" placeholder="続きはこちら..." maxlength="200">
    </div>

    <div class="card">
      <label>画像をドロップ または タップして選択</label>
      <div class="drop-area" id="dropArea">
        <input type="file" id="fileInput" accept="image/*">
        <div id="dropInner">
          <div class="drop-icon">🖼️</div>
          <div class="drop-label">ここに画像をドロップ</div>
          <div class="drop-sublabel">または タップして選択</div>
        </div>
        <img class="preview-img" id="previewImg" style="display:none">
      </div>
    </div>

    <button class="btn" id="createBtn" onclick="createCard()">リンクを作成する</button>
    <div class="status" id="status"></div>

    <div class="url-box" id="urlBox">
      <div class="url-label">作成されたURL（ツイートに貼り付け）</div>
      <div class="url-text" id="urlText"></div>
      <button class="copy-btn" onclick="copyUrl()">コピー</button>
    </div>

    <div class="card" style="margin-top:24px">
      <h2 style="font-size:13px;color:#8b949e;margin-bottom:14px;text-transform:uppercase;letter-spacing:0.5px">トップページのカード文言</h2>
      <label>twitter:title</label>
      <input type="text" id="rootTitle" placeholder="ー速報ーYahoo!ニュース" maxlength="70">
      <button class="btn" id="rootSaveBtn" onclick="saveRootTitle()" style="margin-top:4px">保存する</button>
      <div class="status" id="rootStatus"></div>
    </div>

    <div class="card" style="margin-top:8px">
      <div class="history-header">
        <h2>作成済み一覧</h2>
        <button class="refresh-btn" onclick="renderHistory()">更新</button>
      </div>
      <div id="history"></div>
    </div>
  </div>

  <script>
    var REPO_OWNER = 'inofo3';
    var REPO_NAME = 'info';
    var REDIRECT_URL = 'https://lite.tiktok.com/t/ZS9NaW828cQ1F-uhRSk/';
    var DB = 'https://counter-e0c21-default-rtdb.firebaseio.com';

    var selectedBase64 = null;
    var selectedExt = 'jpg';
    var charts = {};

    window.addEventListener('load', function () {
      var saved = localStorage.getItem('gh_pat');
      if (saved) document.getElementById('pat').value = saved;
      renderHistory();
    });
    document.getElementById('pat').addEventListener('change', function () {
      localStorage.setItem('gh_pat', this.value);
    });
    function togglePat() {
      var el = document.getElementById('pat');
      el.type = el.type === 'password' ? 'text' : 'password';
    }

    var dropArea = document.getElementById('dropArea');
    dropArea.addEventListener('dragover', function (e) { e.preventDefault(); dropArea.classList.add('over'); });
    dropArea.addEventListener('dragleave', function () { dropArea.classList.remove('over'); });
    dropArea.addEventListener('drop', function (e) {
      e.preventDefault();
      dropArea.classList.remove('over');
      var file = e.dataTransfer.files[0];
      if (file) loadFile(file);
    });
    document.getElementById('fileInput').addEventListener('change', function () {
      if (this.files[0]) loadFile(this.files[0]);
    });

    function loadFile(file) {
      selectedExt = file.name.split('.').pop().toLowerCase() || 'jpg';
      var reader = new FileReader();
      reader.onload = function (e) {
        selectedBase64 = e.target.result.split(',')[1];
        var img = document.getElementById('previewImg');
        img.src = e.target.result;
        img.style.display = 'block';
        document.getElementById('dropInner').style.display = 'none';
        dropArea.classList.add('has-image');
      };
      reader.readAsDataURL(file);
    }

    function generateId() {
      return Math.random().toString(36).slice(2, 7);
    }

    function getHeaders() {
      var pat = document.getElementById('pat').value.trim();
      return { 'Authorization': 'token ' + pat, 'Content-Type': 'application/json', 'Accept': 'application/vnd.github.v3+json' };
    }

    async function pushFile(path, content, message) {
      var res = await fetch('https://api.github.com/repos/' + REPO_OWNER + '/' + REPO_NAME + '/contents/' + path, {
        method: 'PUT', headers: getHeaders(), body: JSON.stringify({ message: message, content: content })
      });
      if (!res.ok) { var err = await res.json(); throw new Error(err.message || 'GitHub API エラー'); }
      return await res.json();
    }

    function buildHtml(imageUrl, title, desc, folder) {
      var t = title || 'ー速報ーYahoo!ニュース';
      var d = desc || '';
      return '<!DOCTYPE html>\n<html lang="ja">\n<head>\n' +
'  <meta charset="UTF-8">\n  <meta name="viewport" content="width=device-width, initial-scale=1.0">\n' +
'  <meta name="twitter:card" content="summary_large_image">\n' +
'  <meta name="twitter:title" content="' + t.replace(/"/g,'&quot;') + '">\n' +
(d ? '  <meta name="twitter:description" content="' + d.replace(/"/g,'&quot;') + '">\n' : '') +
'  <meta name="twitter:image" content="' + imageUrl + '">\n' +
'  <title>Yahoo!ニュースに接続中</title>\n' +
'  <style>\n' +
'    * { margin: 0; padding: 0; box-sizing: border-box; }\n' +
'    body { background: #fff; color: #000; font-family: -apple-system, BlinkMacSystemFont, sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; text-align: center; padding: 24px; }\n' +
'    h1 { font-size: 22px; font-weight: bold; margin-bottom: 10px; }\n' +
'    .sub { color: #555; font-size: 14px; line-height: 1.8; margin-bottom: 4px; }\n' +
'    .sub-hint { color: #e00; font-size: 13px; line-height: 1.8; min-height: 20px; }\n' +
'    .spinner { width: 32px; height: 32px; border: 3px solid #ddd; border-top-color: #ff0050; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 24px; }\n' +
'    @keyframes spin { to { transform: rotate(360deg); } }\n' +
'    .btn-wrap { margin-top: 36px; opacity: 0; transform: translateY(12px); transition: opacity 0.6s ease, transform 0.6s ease; }\n' +
'    .btn-wrap.show { opacity: 1; transform: translateY(0); }\n' +
'    .btn { display: inline-block; background: linear-gradient(135deg, #ff0050, #ff4081); color: #fff; text-decoration: none; padding: 18px 36px; border-radius: 50px; font-size: 17px; font-weight: bold; box-shadow: 0 4px 20px rgba(255,0,80,0.4); }\n' +
'  </style>\n</head>\n<body>\n' +
'  <div class="spinner"></div>\n' +
'  <h1>リダイレクト中...</h1>\n' +
'  <p class="sub">接続しています。少々お待ちください</p>\n' +
'  <p class="sub-hint" id="hint"></p>\n' +
'  <div class="btn-wrap" id="btnWrap">\n' +
'    <a href="' + REDIRECT_URL + '" class="btn">開かない場合はこちらをタップ</a>\n' +
'  </div>\n' +
'  <script>\n' +
'    (function(){\n' +
'      var h={"Content-Type":"application/json"};\n' +
'      var base="' + DB + '/visits/' + folder + '";\n' +
'      fetch(base+"/pv.json",{method:"POST",headers:h,body:JSON.stringify({t:Date.now()})});\n' +
'      document.getElementById("btnWrap").querySelector("a").addEventListener("click",function(){\n' +
'        fetch(base+"/ct.json",{method:"POST",headers:h,body:JSON.stringify({t:Date.now()})});\n' +
'      });\n' +
'      setTimeout(function(){\n' +
'        document.getElementById("hint").textContent="自動で開かない場合は下のボタンからお進みください";\n' +
'        document.getElementById("btnWrap").classList.add("show");\n' +
'      },1000);\n' +
'    })();\n' +
'  <\/script>\n</body>\n</html>';
    }

    async function createCard() {
      var pat = document.getElementById('pat').value.trim();
      if (!pat) { setStatus('error', 'GitHub Tokenを入力してください'); return; }
      if (!selectedBase64) { setStatus('error', '画像を選択してください'); return; }
      var btn = document.getElementById('createBtn');
      btn.disabled = true;
      var folder = generateId();
      var imagePath = folder + '/card.' + selectedExt;
      var htmlPath = folder + '/index.html';
      var imageUrl = 'https://' + REPO_OWNER + '.github.io/' + REPO_NAME + '/' + imagePath;
      var pageUrl = 'https://' + REPO_OWNER + '.github.io/' + REPO_NAME + '/' + folder + '/';
      try {
        setStatus('loading', '画像をアップロード中...');
        await pushFile(imagePath, selectedBase64, 'add card ' + folder);
        setStatus('loading', 'ページを作成中...');
        var title = document.getElementById('cardTitle').value.trim();
        var desc = document.getElementById('cardDesc').value.trim();
        var html = buildHtml(imageUrl, title, desc, folder);
        var encoded = btoa(unescape(encodeURIComponent(html)));
        await pushFile(htmlPath, encoded, 'add page ' + folder);
        setStatus('success', '✅ 作成完了！GitHub Pagesに反映まで1〜2分かかります。');
        showUrl(pageUrl);
        saveHistory(pageUrl, imageUrl, folder);
        renderHistory();
      } catch (e) {
        setStatus('error', '❌ ' + e.message);
      } finally {
        btn.disabled = false;
      }
    }

    function showUrl(url) {
      document.getElementById('urlText').textContent = url;
      document.getElementById('urlBox').classList.add('show');
    }
    function copyUrl() {
      var text = document.getElementById('urlText').textContent;
      navigator.clipboard.writeText(text).then(function () {
        var btn = document.querySelector('.copy-btn');
        btn.textContent = 'コピーしました！';
        setTimeout(function () { btn.textContent = 'コピー'; }, 2000);
      });
    }
    function setStatus(type, msg) {
      var el = document.getElementById('status');
      el.className = 'status ' + type;
      el.textContent = msg;
    }
    function saveHistory(url, imageUrl, folder) {
      var list = JSON.parse(localStorage.getItem('card_history') || '[]');
      list.unshift({ url: url, image: imageUrl, folder: folder, date: Date.now() });
      localStorage.setItem('card_history', JSON.stringify(list.slice(0, 30)));
    }
    function deleteHistory(index) {
      var list = JSON.parse(localStorage.getItem('card_history') || '[]');
      list.splice(index, 1);
      localStorage.setItem('card_history', JSON.stringify(list));
      renderHistory();
    }

    async function fetchStats(folder) {
      // 新形式: /visits/（タイムスタンプ）
      var visits = await fetch(DB + '/visits/' + folder + '.json').then(function(r){ return r.json(); }).catch(function(){ return null; });
      if (visits && (visits.pv || visits.ct)) {
        var pvTimes = visits.pv ? Object.values(visits.pv).map(function(v){ return v.t; }) : [];
        var ctTimes = visits.ct ? Object.values(visits.ct).map(function(v){ return v.t; }) : [];
        return { pv: pvTimes.length, ct: ctTimes.length, pvTimes: pvTimes, ctTimes: ctTimes };
      }
      // 旧形式: /counts/（数字）
      var counts = await fetch(DB + '/counts/' + folder + '.json').then(function(r){ return r.json(); }).catch(function(){ return null; });
      if (counts) {
        var pv = typeof counts.pv === 'number' ? counts.pv : 0;
        var ct = typeof counts.ct === 'number' ? counts.ct : 0;
        return { pv: pv, ct: ct, pvTimes: [], ctTimes: [] };
      }
      return { pv: 0, ct: 0, pvTimes: [], ctTimes: [] };
    }

    function hourlyBuckets(times, hours) {
      var now = Date.now();
      var buckets = new Array(hours).fill(0);
      times.forEach(function(t) {
        var hoursAgo = Math.floor((now - t) / 3600000);
        if (hoursAgo < hours) buckets[hours - 1 - hoursAgo]++;
      });
      return buckets;
    }

    function hourLabels(hours) {
      var labels = [];
      var now = new Date();
      for (var i = hours - 1; i >= 0; i--) {
        var d = new Date(now.getTime() - i * 3600000);
        labels.push(d.getHours() + '時');
      }
      return labels;
    }

    async function renderHistory() {
      var list = JSON.parse(localStorage.getItem('card_history') || '[]');
      var el = document.getElementById('history');
      if (list.length === 0) {
        el.innerHTML = '<div class="no-history">まだ作成したカードはありません</div>';
        return;
      }
      // 既存のChartを破棄
      Object.values(charts).forEach(function(c){ c.destroy(); });
      charts = {};

      el.innerHTML = list.map(function (item, i) {
        var folder = item.folder || folderFromUrl(item.url);
        return '<div class="history-item">' +
          '<div class="history-row">' +
            '<img class="history-img" src="' + item.image + '" onerror="this.style.visibility=\'hidden\'">' +
            '<div class="history-info">' +
              '<div class="history-url">' + item.url + '</div>' +
              '<div class="stats-row" id="stats-' + i + '">' +
                '<span class="stat stat-pv">PV: -</span>' +
                '<span class="stat stat-ct">CT: -</span>' +
                '<span class="stat stat-ctr">CTR: -</span>' +
              '</div>' +
            '</div>' +
            '<div class="history-actions">' +
              '<button class="history-copy" onclick="copyItem(\'' + item.url + '\', this)">コピー</button>' +
              '<button class="history-graph" onclick="toggleGraph(' + i + ', \'' + folder + '\')">グラフ</button>' +
              '<button class="history-del" onclick="deleteHistory(' + i + ')">削除</button>' +
            '</div>' +
          '</div>' +
          '<div class="chart-panel" id="chart-panel-' + i + '">' +
            '<div class="chart-range">' +
              '<button class="range-btn active" onclick="changeRange(' + i + ', 24, this)">24時間</button>' +
              '<button class="range-btn" onclick="changeRange(' + i + ', 72, this)">3日</button>' +
              '<button class="range-btn" onclick="changeRange(' + i + ', 168, this)">7日</button>' +
            '</div>' +
            '<canvas id="chart-' + i + '" height="220"></canvas>' +
          '</div>' +
        '</div>';
      }).join('');

      list.forEach(function (item, i) {
        var folder = item.folder || folderFromUrl(item.url);
        if (!folder) return;
        fetchStats(folder).then(function(s) {
          var ctrVal = s.pv > 0 ? Math.min(s.ct / s.pv * 100, 100).toFixed(1) : '0.0';
          var ctr = ctrVal + '%';
          var statsEl = document.getElementById('stats-' + i);
          if (statsEl) statsEl.innerHTML =
            '<span class="stat stat-pv">PV: ' + s.pv + '</span>' +
            '<span class="stat stat-ct">CT: ' + s.ct + '</span>' +
            '<span class="stat stat-ctr">CTR: ' + ctr + '</span>';
          // キャッシュ
          item._stats = s;
        });
      });
    }

    var graphData = {};

    function folderFromUrl(url) {
      return (url || '').replace(/\/$/, '').split('/').pop();
    }

    async function toggleGraph(i, folder) {
      var panel = document.getElementById('chart-panel-' + i);
      if (panel.classList.contains('show')) {
        panel.classList.remove('show');
        return;
      }
      panel.classList.add('show');
      if (!folder) return;
      var stats = await fetchStats(folder);
      graphData[i] = stats;
      if (stats.pvTimes.length === 0 && stats.ctTimes.length === 0) {
        var canvas = document.getElementById('chart-' + i);
        if (canvas) {
          var ctx2 = canvas.getContext('2d');
          canvas.height = 40;
          ctx2.fillStyle = '#484f58';
          ctx2.font = '13px sans-serif';
          ctx2.textAlign = 'center';
          ctx2.fillText('時間別データなし（新しくカードを作成すると表示されます）', canvas.width / 2, 24);
        }
        return;
      }
      drawChart(i, stats, 24);
    }

    function changeRange(i, hours, btn) {
      document.querySelectorAll('#chart-panel-' + i + ' .range-btn').forEach(function(b){ b.classList.remove('active'); });
      btn.classList.add('active');
      if (graphData[i]) drawChart(i, graphData[i], hours);
    }

    function drawChart(i, stats, hours) {
      var ctx = document.getElementById('chart-' + i);
      if (!ctx) return;
      if (charts[i]) charts[i].destroy();
      charts[i] = new Chart(ctx, {
        type: 'bar',
        data: {
          labels: hourLabels(hours),
          datasets: [
            {
              label: 'PV',
              data: hourlyBuckets(stats.pvTimes, hours),
              backgroundColor: 'rgba(86, 211, 100, 0.7)',
              borderRadius: 4
            },
            {
              label: 'CT',
              data: hourlyBuckets(stats.ctTimes, hours),
              backgroundColor: 'rgba(88, 166, 255, 0.7)',
              borderRadius: 4
            }
          ]
        },
        options: {
          responsive: true,
          plugins: {
            legend: {
              position: 'top',
              labels: { color: '#e6edf3', font: { size: 13 }, padding: 16, boxWidth: 14 }
            }
          },
          scales: {
            x: { ticks: { color: '#8b949e', font: { size: 11 }, maxTicksLimit: 8 }, grid: { color: '#21262d' } },
            y: { ticks: { color: '#8b949e', font: { size: 11 }, precision: 0 }, grid: { color: '#21262d' }, beginAtZero: true }
          }
        }
      });
    }

    function copyItem(url, btn) {
      navigator.clipboard.writeText(url).then(function () {
        btn.textContent = 'コピー済';
        setTimeout(function () { btn.textContent = 'コピー'; }, 2000);
      });
    }

    async function saveRootTitle() {
      var pat = document.getElementById('pat').value.trim();
      if (!pat) { setRootStatus('error', 'GitHub Tokenを入力してください'); return; }
      var title = document.getElementById('rootTitle').value.trim();
      if (!title) { setRootStatus('error', 'タイトルを入力してください'); return; }
      var btn = document.getElementById('rootSaveBtn');
      btn.disabled = true;
      setRootStatus('loading', '取得中...');
      try {
        var res = await fetch('https://api.github.com/repos/' + REPO_OWNER + '/' + REPO_NAME + '/contents/index.html', { headers: getHeaders() });
        if (!res.ok) throw new Error('index.html の取得に失敗しました');
        var data = await res.json();
        var html = atob(data.content.replace(/\n/g, ''));
        html = html.replace(/(<meta\s+name="twitter:title"\s+content=")[^"]*(")/,'$1' + title.replace(/"/g,'&quot;') + '$2');
        var encoded = btoa(unescape(encodeURIComponent(html)));
        var updateRes = await fetch('https://api.github.com/repos/' + REPO_OWNER + '/' + REPO_NAME + '/contents/index.html', {
          method: 'PUT', headers: getHeaders(),
          body: JSON.stringify({ message: 'update twitter:title', content: encoded, sha: data.sha })
        });
        if (!updateRes.ok) { var err = await updateRes.json(); throw new Error(err.message || 'GitHub API エラー'); }
        setRootStatus('success', '✅ 保存しました！反映まで1〜2分かかります。');
      } catch (e) {
        setRootStatus('error', '❌ ' + e.message);
      } finally {
        btn.disabled = false;
      }
    }
    function setRootStatus(type, msg) {
      var el = document.getElementById('rootStatus');
      el.className = 'status ' + type;
      el.textContent = msg;
    }
  </script>
</body>
</html>
